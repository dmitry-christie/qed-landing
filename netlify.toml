[build]
  publish = "."
  command = "node build.mjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# publish = "." means the whole repo root is served as static files. Internal docs
# (CLAUDE.md, PAID-ADS-PLAN.md, PRODUCT.md, package.json, etc.) are deleted from the
# ephemeral build tree by build.mjs before Netlify uploads it — see build.mjs's final
# step. That approach doesn't work for netlify/ (functions are bundled from that source
# directory as a separate build phase, so it must survive on disk); block it here instead.
# Netlify redirect splats only match a TRAILING wildcard ("/netlify/*"), never a suffix
# ("/*.md") — that's why this used to be a `from = "/*.md"` rule that silently never matched.
[[redirects]]
  from = "/netlify/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/netlify"
  to = "/"
  status = 404
  force = true

# Shared assets (css/js/images/fonts) live under /shared/. They aren't content-hashed,
# so keep max-age conservative (1 day) — long enough to help retargeted/multi-session
# repeat visitors and Lighthouse's "efficient cache policy" audit (a Google Ads landing-
# page-experience signal), short enough that a deploy propagates within a day.
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# config.js is regenerated per-brand at build time — must never be served stale.
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache"
